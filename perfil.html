<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil do Usuário - Codina Universe</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- BARRA LATERAL (aparece só se logado) -->
<div id="sidebar" style="display:none;">
  <div class="sidebar-top" id="user-status">Você está Logado!</div>
  <div class="sidebar-bottom" id="logout-btn">Desconectar</div>
</div>

<div id="site-content">
  <header>
    <div class="logo-container">
      <img src="images/codina-logosite.png" alt="Codina" class="logo-main">
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="perfil.html" class="active">Perfil</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="profile-main">
    <section class="profile-info">
      <h1>Bem-vindo, <span id="username-display">Usuário</span>!</h1>
      <p>Email: <span id="user-email">email@dominio.com</span></p>
      <p>Status: Logado</p>
    </section>

    <section class="profile-actions">
      <h2>Ações</h2>
      <button id="edit-profile-btn">Editar Perfil</button>
      <button id="change-password-btn">Alterar Senha</button>
    </section>
  </main>
</div>

<script src="js/profile.js"></script>
</body>
</html>
